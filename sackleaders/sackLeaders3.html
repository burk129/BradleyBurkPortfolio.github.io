<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sack Rate vs. Average TTT Regression Lines</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body{
    font-family: Arial;
    text-align:center;
}

canvas{
    width:900px;
    margin:auto;
}
</style>

</head>

<body>

<h2>NFL Sack Performance vs Average Time to Throw</h2>

<canvas id="scatterChart" width="900" height="450"></canvas>

<script>

loadExcel();

async function loadExcel(){

    const response = await fetch("sack leaders.xlsx");
    const arrayBuffer = await response.arrayBuffer();

    const workbook = XLSX.read(arrayBuffer,{type:"array"});
    const sheet = workbook.Sheets[workbook.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(sheet);

    const wattGames = [];
    const garrettGames = [];

    rows.forEach(row => {

        const player = row["Player"];
        const sackRate = Number(row["Player's Game Sack Rate"]);
        const timeToThrow = Number(row["Season Average Time to Throw"]);

        if(!timeToThrow || !sackRate) return;

        if(player.includes("Watt")){
            wattGames.push({x:timeToThrow, y:sackRate});
        }

        if(player.includes("Garrett")){
            garrettGames.push({x:timeToThrow, y:sackRate});
        }

    });

    createChart(wattGames, garrettGames);

}


function regression(points){

    const n = points.length;

    let sumX = 0;
    let sumY = 0;
    let sumXY = 0;
    let sumXX = 0;

    points.forEach(p=>{
        sumX += p.x;
        sumY += p.y;
        sumXY += p.x * p.y;
        sumXX += p.x * p.x;
    });

    const slope = (n*sumXY - sumX*sumY) / (n*sumXX - sumX*sumX);
    const intercept = (sumY - slope*sumX)/n;

    return {slope, intercept};
}


function regressionLine(points){

    const {slope, intercept} = regression(points);

    const xs = points.map(p => p.x);

    const minX = Math.min(...xs);
    const maxX = Math.max(...xs);

    return [
        {x:minX, y:slope*minX + intercept},
        {x:maxX, y:slope*maxX + intercept}
    ];
}


function createChart(wattGames, garrettGames){

    new Chart(document.getElementById("scatterChart"),{

        type:"scatter",

        data:{
            datasets:[

            {
                label:"T.J. Watt Games",
                data:wattGames,
                backgroundColor:"Black",
                pointRadius:6
            },

            {
                label:"T.J. Watt Regression",
                data:regressionLine(wattGames),
                type:"line",
                borderColor:"Black",
                fill:false,
                pointRadius:0,
                borderWidth:3
            },

            {
                label:"Myles Garrett Games",
                data:garrettGames,
                backgroundColor:"orange",
                pointRadius:6
            },

            {
                label:"Myles Garrett Regression",
                data:regressionLine(garrettGames),
                type:"line",
                borderColor:"orange",
                fill:false,
                pointRadius:0,
                borderWidth:3
            }

            ]
        },

        options:{
            responsive:true,
            plugins:{
                legend:{position:"top"}
            },
            scales:{
                x:{
                    title:{
                        display:true,
                        text:"Average Time to Throw (seconds)"
                    }
                },
                y:{
                    title:{
                        display:true,
                        text:"Player Game Sack Rate"
                    }
                }
            }
        }

    });

}

</script>

</body>
</html>
