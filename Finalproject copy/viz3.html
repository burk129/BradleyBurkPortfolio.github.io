<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heatmap Matrix</title>

    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/seedrandom/3.0.5/seedrandom.min.js"></script>
</head>

<body>

    <h1>There is no data for the years 1947-1968 after data filtering. Therefore, the generated heatmap matrices represent global aid interactions for the following years: 1969-1979, 1980-1990, 1991-2002, and 2003-2013</h1>
    <label>
      Select a year range:
    </label>
      <select id="yearFilter">
        <option value="1969-1979">1969–1979</option>
        <option value="1980-1990">1980–1990</option>
        <option value="1991-2002">1991–2002</option>
        <option value="2003-2013">2003–2013</option>
      </select>
    </label>

    <button id = "mainpage" onclick="window.location.href = 'mainpage.html'">Back to Main page</button>


    <div id="tooltip" 
     style=
        "position: absolute;
        padding: 6px 10px;
        background: white;
        border: 1px solid #aaa;
        border-radius: 4px;
        pointer-events: none;
        font-size: 12px;
        opacity: 0;">
    </div>

    <div id = "heatmap">
    </div>

    <style>
        svg {
            width: 1200px;
            height: 850px;
            border: 1px solid #eee;

        }
    </style>

    <script type="text/javascript">
      async function Heatmap(rangeString) {
        //load the data
        const raw = await d3.csv("AidData.csv");

        const [start, end] = rangeString.split("-").map(Number);

            // Map the data and filter out invalid entries
            const data = raw.map(d => ({
                    Donor: d.donor,
                    Recipient: d.recipient,
                    Year: +d.year,
                    purposeCode: +d.coalesced_purpose_code,
                    purpose: d.coalesced_purpose_name,
                    amount: +d.commitment_amount_usd_constant_sum
                }))
                .filter(d => !isNaN(d.amount))
                .filter(d => d.Year >= start && d.Year <= end);

            console.log("Filtered data:", data);
        // set the dimensions and margins of the graph
        const margin = {top: 50, right: 220, bottom: 240, left: 220},
          width = 1200 - margin.left - margin.right,
          height = 750 - margin.top - margin.bottom;

        const matrix = d3.rollups(
          data,
          v => d3.sum(v, d => d.amount),
          d => d.Donor,
          d => d.Recipient
        ).map(([donor, recipients]) =>
        recipients.map(([recipient, amount]) => ({
          group: donor,
          variable: recipient,
          value: amount
        }))
        ).flat();
        
        d3.select("#heatmap").selectAll("*").remove();

        // append the svg object to the body of the page
        const svg = d3.select("#heatmap")
          .append("svg")
          .attr("width", width + margin.left + margin.right)
          .attr("height", height + margin.top + margin.bottom)
          .append("g")
          .attr("transform", `translate(${margin.left},${margin.top})`);

        const uniqueDonors = Array.from(new Set(matrix.map(d => d.group)));
        console.log(uniqueDonors);

        const uniqueRecipients = Array.from(new Set(matrix.map(d => d.variable)));
        console.log(uniqueRecipients);
        
        // Build X scales and axis:
        const x = d3.scaleBand()
          .range([ 0, width ])
          .domain(uniqueDonors)
          .padding(0.01);
        svg.append("g")
        .attr("transform", `translate(0, ${height})`)
        .call(d3.axisBottom(x))
        .selectAll("text")
            .attr("transform", "rotate(-90)")
            .style("text-anchor", "end")
            .attr("dx", "-0.8em")
            .attr("dy", "-0.5em");
        
        // Build X scales and axis:
        const y = d3.scaleBand()
          .range([ height, 0 ])
          .domain(uniqueRecipients)
          .padding(0.01);
        svg.append("g")
          .call(d3.axisLeft(y));

        const maxAmount = d3.max(matrix, d => d.value);
        const legendWidth = 20;
        const legendHeight = 200;

        const legend = svg.append("g")
          .attr("class", "legend")
          .attr("transform", "translate(850, 100)");

        const legendScale = d3.scaleLinear()
          .domain([0, maxAmount])    // SAME domain as your heatmap color scale
          .range([legendHeight, 0]);

        const legendGradient = svg.append("defs")
          .append("linearGradient")
          .attr("id", "legend-gradient")
          .attr("x1", "0%")
          .attr("y1", "100%")
          .attr("x2", "0%")
          .attr("y2", "0%");

        const stops = d3.range(0, 1.01, 0.1).map(t => ({
          offset: `${t * 100}%`,
          color: d3.interpolateBlues(t)
        }));

        legendGradient.selectAll("stop")
          .data(stops)
          .enter()
          .append("stop")
          .attr("offset", d => d.offset)
          .attr("stop-color", d => d.color);

        legend.append("rect")
          .attr("width", legendWidth)
          .attr("height", legendHeight)
          .style("fill", "url(#legend-gradient)");

        const legendAxis = d3.axisRight(legendScale)
          .ticks(6);

        legend.append("g")
          .attr("transform", `translate(${legendWidth},0)`)
          .call(legendAxis);

        legend.append("text")
          .attr("x", 0)
          .attr("y", -10)
          .text("Amount of Aid (USD)")
          .style("font-size", "12px")
          .style("font-weight", "bold");

        const myColor = d3.scaleSequential()
          .interpolator(d3.interpolateBlues)
          .domain([0, d3.max(matrix, d => d.value)]);
        
        // Add the squares
        svg.selectAll("rect.cell")
            .data(matrix)  
            .join("rect")
              .attr("class", "cell")
              .attr("x", function(d) { return x(d.group) })
              .attr("y", function(d) { return y(d.variable) })
              .attr("width", x.bandwidth() )
              .attr("height", y.bandwidth() )
              .style("fill", function(d) { return myColor(d.value)} )
              .style("cursor", "pointer")
              .on("mouseover", function(event, d) {
                d3.select("#tooltip")
                .style("opacity", 1)
                .html(`
                  <strong>Donor:</strong> ${d.group}<br>
                  <strong>Recipient:</strong> ${d.variable}<br>
                  <strong>Amount:</strong> $${d.value.toLocaleString()}
            `);
            })
                .on("mousemove", function(event) {
                d3.select("#tooltip")
                .style("left", (event.pageX + 12) + "px")
                .style("top", (event.pageY - 28) + "px");
            })
            .on("mouseout", function() {
              d3.select("#tooltip")
                .style("opacity", 0);
            })
    }

    document.getElementById("yearFilter").addEventListener("change", function() {
    Heatmap(this.value);
    });

    Heatmap("1969-1979");
   
    </script>

</body>

</html>
