<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Super Bowl SOS vs Points Scatter</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<style>
body { font-family: Arial; text-align:center; }
canvas { width:900px; height:500px; margin:auto; display:block; }
</style>
</head>
<body>

<h2>Strength of Schedule vs Points Scored in Super Bowl</h2>
<canvas id="scatterChart"></canvas>

<script>
async function loadExcel() {
    const response = await fetch('Strength of Schedule for SB Teams.xlsx');
    const arrayBuffer = await response.arrayBuffer();
    const workbook = XLSX.read(arrayBuffer, { type: "array" });
    console.log("Sheet Names:", workbook.SheetNames);
    const sheet = workbook.Sheets[workbook.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(sheet);

    // Convert x and y to numbers, trim team names
    const points = rows.map(r => {
        const x = parseFloat(r["Strength of Schedule (teamrankings.com)"]);
        const y = parseFloat(r["Pts Scored"]);
        const team = r["Team"] ? r["Team"].toString().trim() : "Unknown";
        if (isNaN(x) || isNaN(y)) return null;
        return { x, y, team };
    }).filter(p => p !== null);

    console.log(points);
    //console.log(Object.keys(rows[0]));

    buildChart(points);
}

function buildChart(points) {
    const xCenter = points.reduce((sum,p)=>sum+p.x,0)/points.length;
    const yCenter = points.reduce((sum,p)=>sum+p.y,0)/points.length;

    const datasets = [{
        label: "Teams",
        data: points.map(p => ({ x: p.x, y: p.y })), // ONLY x and y
        pointRadius: 6,
        pointBackgroundColor: "blue"
    }];

    // Quadrant lines
    const quadrantLines = {
        id: 'quadrantLines',
        afterDraw(chart) {
            const { ctx, chartArea: { left, right, top, bottom }, scales: { x, y } } = chart;
            const xPixel = x.getPixelForValue(xCenter);
            const yPixel = y.getPixelForValue(yCenter);
            ctx.save();
            ctx.setLineDash([6,6]);
            ctx.strokeStyle = "black";
            ctx.lineWidth = 2;
            // Vertical
            ctx.beginPath();
            ctx.moveTo(xPixel, top);
            ctx.lineTo(xPixel, bottom);
            ctx.stroke();
            // Horizontal
            ctx.beginPath();
            ctx.moveTo(left, yPixel);
            ctx.lineTo(right, yPixel);
            ctx.stroke();
            ctx.restore();
        }
    };

    // Label plugin
    const labelPlugin = {
        id: 'labels',
        afterDatasetsDraw(chart) {
            const { ctx, scales: { x, y } } = chart;
            points.forEach(p => {
                const xPixel = x.getPixelForValue(p.x);
                const yPixel = y.getPixelForValue(p.y);
                ctx.fillStyle = "black";
                ctx.font = "10px Arial";
                ctx.fillText(p.team.split("(")[0].trim(), xPixel + 5, yPixel - 5);
            });
        }
    };

    new Chart(document.getElementById('scatterChart'), {
        type: 'scatter',
        data: { datasets },
        options: {
            scales: {
                x: { title: { display: true, text: "Strength of Schedule" } },
                y: { title: { display: true, text: "Points Scored" } }
            },
            plugins: {
                tooltip: {
                    callbacks: {
                        label: ctx => {
                            const p = points[ctx.dataIndex];
                            return `${p.team}: ${p.y} pts`;
                        }
                    }
                }
            }
        },
        plugins: [quadrantLines, labelPlugin]
    });
}

loadExcel();
</script>

</body>
</html>
