<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sack Season Quadrant Plot</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body{
    font-family: Arial;
    text-align:center;
}

canvas{
    width:900px;
    margin:auto;
}
</style>

</head>

<body>

<h2>NFL Sack Performance vs Opponent Difficulty</h2>

<canvas id="scatterChart"></canvas>

<script>

let chart;

loadExcel();

async function loadExcel(){

    const response = await fetch("sack leaders.xlsx");
    const arrayBuffer = await response.arrayBuffer();

    const workbook = XLSX.read(arrayBuffer,{type:"array"});
    const sheet = workbook.Sheets[workbook.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(sheet);

    const points = rows
    .map(row => ({
        x: parseFloat(row["Opponents' Season Sack Rate"]),
        y: parseFloat(row["Player's Game Sack Rate"]),
        player: row["Player"]
    }))
    .filter(p => !isNaN(p.x) && !isNaN(p.y));
    
    buildChart(points);

}


function buildChart(points){

    const xCenter = average(points.map(p=>p.x));
    const yCenter = average(points.map(p=>p.y));

    const quadrantLines = {
        id:'quadrantLines',
        afterDraw(chart){

            const {ctx,chartArea:{left,right,top,bottom},scales:{x,y}} = chart;

            ctx.save();

            const xPos = x.getPixelForValue(xCenter);
            const yPos = y.getPixelForValue(yCenter);

            ctx.beginPath();
            ctx.moveTo(xPos,top);
            ctx.lineTo(xPos,bottom);
            ctx.lineWidth = 2;
            ctx.strokeStyle = "black";
            ctx.stroke();

            ctx.beginPath();
            ctx.moveTo(left,yPos);
            ctx.lineTo(right,yPos);
            ctx.lineWidth = 2;
            ctx.strokeStyle = "black";
            ctx.stroke();

            ctx.restore();
        }
    };

    
    const playerColors = {
        "Michael Strahan (2001, 22.5)": "blue",
        "T.J. Watt (2021, 22.5)": "yellow",
        "Myles Garrett (2025, 23.0)": "orange"
    };

    const datasets = Object.keys(playerColors).map(player => ({
        label: player,
        data: points.filter(p => p.player === player),
        pointRadius: 6,
        pointBackgroundColor: playerColors[player]
    }));

    chart = new Chart(document.getElementById('scatterChart'), {
    type:'scatter',
    data:{
        datasets: datasets
    },
    options:{
        scales:{
            x:{
                title:{
                    display:true,
                    text:"Opponent Season Sack Rate"
                }
            },
            y:{
                title:{
                    display:true,
                    text:"Player Game Sack Rate"
                }
            }
        }
    },
    plugins:[quadrantLines]
});

}


function average(arr){
    return arr.reduce((a,b)=>a+b,0)/arr.length;
}

</script>

</body>
</html>
