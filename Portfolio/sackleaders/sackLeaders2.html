<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sack Rate vs Offensive Tier Box Plot</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js@2.9.4"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-chart-box-and-violin-plot/build/Chart.BoxPlot.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body{
    font-family: Arial;
    text-align:center;
}
canvas{
    max-width:900px;
    margin:auto;
}
</style>
</head>

<body>

<h2>Sack Rate vs Offensive Tier</h2>
<canvas id="boxChart" width="900" height="400"></canvas>

<script>

//Chart.register(ChartBoxPlot.BoxPlotController, ChartBoxPlot.BoxAndWhiskers);

loadExcel();

async function loadExcel(){

    const response = await fetch("sack leaders.xlsx");
    const buffer = await response.arrayBuffer();

    const workbook = XLSX.read(buffer,{type:"array"});
    const sheet = workbook.Sheets[workbook.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(sheet);

    const tiers = ["Elite","Good","Average","Poor"];

    const players = [
        "Michael Strahan (2001, 22.5)",
        "T.J. Watt (2021, 22.5)",
        "Myles Garrett (2025, 23.0)"
    ];

    const colors = {
        "Michael Strahan (2001, 22.5)": "blue",
        "T.J. Watt (2021, 22.5)": "yellow",
        "Myles Garrett (2025, 23.0)": "orange"
    };

    const dataMap = {};

    players.forEach(p=>{
        dataMap[p] = {Elite:[],Good:[],Average:[],Poor:[]};
    });

    rows.forEach(row=>{

        const player = row["Player"];
        const rank = Number(row["Opponents' Offensive Ranking by PPG (The Football Database)"]);
        const sackRate = Number(row["Player's Game Sack Rate"]);

        if(!dataMap[player]) return;

        if(rank <= 8) dataMap[player].Elite.push(sackRate);
        else if(rank <= 16) dataMap[player].Good.push(sackRate);
        else if(rank <= 24) dataMap[player].Average.push(sackRate);
        else dataMap[player].Poor.push(sackRate);

    });

    const datasets = players.map(player=>({

        label: player,
        backgroundColor: colors[player],
        borderColor: "black",
        borderWidth:1,

        outlierColor: colors[player],   // change color
        outlierRadius: 6,               // make them bigger
        outlierBorderColor: "black",
        outlierBorderWidth: 1,

        data: tiers.map(tier => dataMap[player][tier])

    }));


    const ctx = document.getElementById("boxChart");

    new Chart(ctx,{

        type:"boxplot",

        data:{
            labels: tiers,
            datasets: datasets
        },

        options:{
            responsive:true,

            plugins:{
                legend:{position:"top"},
                tooltip:{
                    callbacks:{
                        label:(ctx)=>{
                            const v = ctx.raw;
                            return `min:${v.min} q1:${v.q1} median:${v.median} q3:${v.q3} max:${v.max}`;
                        }
                    }
                }
            },

            scales:{
                y:{
                    title:{
                        display:true,
                        text:"Player Game Sack Rate"
                    }
                },
                x:{
                    title:{
                        display:true,
                        text:"Opponent Tier"
                    }
                }
            }
        }

    });

}

</script>

</body>
</html>
